<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" width="800" height="160">
  <defs>
    <!-- Main fill gradient: blue → purple → pink → coral → orange -->
    <linearGradient id="fill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#56b4f7"/>
      <stop offset="25%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#f472b6"/>
      <stop offset="75%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <!-- Shadow layer 1: same gradient, lower opacity -->
    <linearGradient id="shadow1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#56b4f7" stop-opacity="0.3"/>
      <stop offset="25%" stop-color="#a78bfa" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#f472b6" stop-opacity="0.3"/>
      <stop offset="75%" stop-color="#f87171" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.3"/>
    </linearGradient>
    <!-- Shadow layer 2: even lower opacity -->
    <linearGradient id="shadow2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#56b4f7" stop-opacity="0.15"/>
      <stop offset="25%" stop-color="#a78bfa" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#f472b6" stop-opacity="0.15"/>
      <stop offset="75%" stop-color="#f87171" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Each letter is built from rects. Shadow layers are offset copies. -->
  <!-- Unit: 10px blocks, letters ~60px wide, 90px tall, 10px gaps -->

  <!-- ==================== SHADOW LAYER 2 (offset +12,+12) ==================== -->
  <g fill="none" stroke="url(#shadow2)" stroke-width="1.5">
    <!-- P -->
    <rect x="32" y="42" width="12" height="90"/>
    <rect x="44" y="42" width="40" height="12"/>
    <rect x="84" y="42" width="12" height="42"/>
    <rect x="44" y="72" width="40" height="12"/>
    <!-- O -->
    <rect x="118" y="42" width="12" height="90"/>
    <rect x="130" y="42" width="40" height="12"/>
    <rect x="170" y="42" width="12" height="90"/>
    <rect x="130" y="120" width="40" height="12"/>
    <!-- L -->
    <rect x="204" y="42" width="12" height="90"/>
    <rect x="216" y="120" width="52" height="12"/>
    <!-- Y -->
    <rect x="290" y="42" width="12" height="42"/>
    <rect x="342" y="42" width="12" height="42"/>
    <rect x="302" y="72" width="40" height="12"/>
    <rect x="312" y="84" width="12" height="48"/>
    <!-- C -->
    <rect x="376" y="42" width="12" height="90"/>
    <rect x="388" y="42" width="52" height="12"/>
    <rect x="388" y="120" width="52" height="12"/>
    <!-- O -->
    <rect x="462" y="42" width="12" height="90"/>
    <rect x="474" y="42" width="40" height="12"/>
    <rect x="514" y="42" width="12" height="90"/>
    <rect x="474" y="120" width="40" height="12"/>
    <!-- D -->
    <rect x="548" y="42" width="12" height="90"/>
    <rect x="560" y="42" width="40" height="12"/>
    <rect x="600" y="54" width="12" height="66"/>
    <rect x="560" y="120" width="40" height="12"/>
    <!-- E -->
    <rect x="634" y="42" width="12" height="90"/>
    <rect x="646" y="42" width="52" height="12"/>
    <rect x="646" y="78" width="40" height="12"/>
    <rect x="646" y="120" width="52" height="12"/>
  </g>

  <!-- ==================== SHADOW LAYER 1 (offset +6,+6) ==================== -->
  <g fill="none" stroke="url(#shadow1)" stroke-width="2">
    <!-- P -->
    <rect x="26" y="36" width="12" height="90"/>
    <rect x="38" y="36" width="40" height="12"/>
    <rect x="78" y="36" width="12" height="42"/>
    <rect x="38" y="66" width="40" height="12"/>
    <!-- O -->
    <rect x="112" y="36" width="12" height="90"/>
    <rect x="124" y="36" width="40" height="12"/>
    <rect x="164" y="36" width="12" height="90"/>
    <rect x="124" y="114" width="40" height="12"/>
    <!-- L -->
    <rect x="198" y="36" width="12" height="90"/>
    <rect x="210" y="114" width="52" height="12"/>
    <!-- Y -->
    <rect x="284" y="36" width="12" height="42"/>
    <rect x="336" y="36" width="12" height="42"/>
    <rect x="296" y="66" width="40" height="12"/>
    <rect x="306" y="78" width="12" height="48"/>
    <!-- C -->
    <rect x="370" y="36" width="12" height="90"/>
    <rect x="382" y="36" width="52" height="12"/>
    <rect x="382" y="114" width="52" height="12"/>
    <!-- O -->
    <rect x="456" y="36" width="12" height="90"/>
    <rect x="468" y="36" width="40" height="12"/>
    <rect x="508" y="36" width="12" height="90"/>
    <rect x="468" y="114" width="40" height="12"/>
    <!-- D -->
    <rect x="542" y="36" width="12" height="90"/>
    <rect x="554" y="36" width="40" height="12"/>
    <rect x="594" y="48" width="12" height="66"/>
    <rect x="554" y="114" width="40" height="12"/>
    <!-- E -->
    <rect x="628" y="36" width="12" height="90"/>
    <rect x="640" y="36" width="52" height="12"/>
    <rect x="640" y="72" width="40" height="12"/>
    <rect x="640" y="114" width="52" height="12"/>
  </g>

  <!-- ==================== MAIN FILLED LAYER ==================== -->
  <g fill="url(#fill)">
    <!-- P -->
    <rect x="20" y="30" width="12" height="90"/>
    <rect x="32" y="30" width="40" height="12"/>
    <rect x="72" y="30" width="12" height="42"/>
    <rect x="32" y="60" width="40" height="12"/>
    <!-- O -->
    <rect x="106" y="30" width="12" height="90"/>
    <rect x="118" y="30" width="40" height="12"/>
    <rect x="158" y="30" width="12" height="90"/>
    <rect x="118" y="108" width="40" height="12"/>
    <!-- L -->
    <rect x="192" y="30" width="12" height="90"/>
    <rect x="204" y="108" width="52" height="12"/>
    <!-- Y -->
    <rect x="278" y="30" width="12" height="42"/>
    <rect x="330" y="30" width="12" height="42"/>
    <rect x="290" y="60" width="40" height="12"/>
    <rect x="300" y="72" width="12" height="48"/>
    <!-- C -->
    <rect x="364" y="30" width="12" height="90"/>
    <rect x="376" y="30" width="52" height="12"/>
    <rect x="376" y="108" width="52" height="12"/>
    <!-- O -->
    <rect x="450" y="30" width="12" height="90"/>
    <rect x="462" y="30" width="40" height="12"/>
    <rect x="502" y="30" width="12" height="90"/>
    <rect x="462" y="108" width="40" height="12"/>
    <!-- D -->
    <rect x="536" y="30" width="12" height="90"/>
    <rect x="548" y="30" width="40" height="12"/>
    <rect x="588" y="42" width="12" height="66"/>
    <rect x="548" y="108" width="40" height="12"/>
    <!-- E -->
    <rect x="622" y="30" width="12" height="90"/>
    <rect x="634" y="30" width="52" height="12"/>
    <rect x="634" y="66" width="40" height="12"/>
    <rect x="634" y="108" width="52" height="12"/>
  </g>

  <!-- White highlights on leading edges of main layer -->
  <g fill="white" opacity="0.25">
    <!-- P top-left -->
    <rect x="20" y="30" width="12" height="3"/>
    <rect x="20" y="30" width="3" height="12"/>
    <!-- O top-left -->
    <rect x="106" y="30" width="12" height="3"/>
    <rect x="106" y="30" width="3" height="12"/>
    <!-- L top-left -->
    <rect x="192" y="30" width="12" height="3"/>
    <rect x="192" y="30" width="3" height="12"/>
    <!-- Y top-left -->
    <rect x="278" y="30" width="12" height="3"/>
    <rect x="278" y="30" width="3" height="12"/>
    <!-- C top-left -->
    <rect x="364" y="30" width="12" height="3"/>
    <rect x="364" y="30" width="3" height="12"/>
    <!-- O top-left -->
    <rect x="450" y="30" width="12" height="3"/>
    <rect x="450" y="30" width="3" height="12"/>
    <!-- D top-left -->
    <rect x="536" y="30" width="12" height="3"/>
    <rect x="536" y="30" width="3" height="12"/>
    <!-- E top-left -->
    <rect x="622" y="30" width="12" height="3"/>
    <rect x="622" y="30" width="3" height="12"/>
  </g>
</svg>
